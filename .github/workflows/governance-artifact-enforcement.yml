name: Governance Artifact Enforcement

# Authority: AMC 90/10 Admin Protocol v1.0.0, Issue #1063
# Purpose: Enforce allowed governance artifact paths per the artifact taxonomy.
#          Block merge if new files are created in deprecated admin paths.
# Effective: 2026-04-13

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  artifact-path-enforcement:
    name: "governance/artifact-path-enforcement"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Bypass for layer-down and governance alignment PRs
        id: bypass_check
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_LABELS" == *"layer-down"* ]] || \
             [[ "$PR_BRANCH" == *"layer-down"* ]] || \
             [[ "$PR_TITLE" == *"layer-down"* ]] || \
             [[ "$PR_TITLE" == *"Layer-Down"* ]] || \
             [[ "$PR_BRANCH" == "governance-alignment-auto" ]] || \
             ( [[ "$PR_LABELS" == *"governance"* ]] && [[ "$PR_LABELS" == *"automated"* ]] && [[ "$PR_LABELS" == *"agent:liaison"* ]] ); then
            echo "✅ Layer-down / governance alignment PR — bypassing artifact enforcement."
            echo "bypass=true" >> "$GITHUB_OUTPUT"
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for deprecated artifact paths
        if: steps.bypass_check.outputs.bypass != 'true'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "=== Governance Artifact Path Enforcement ==="
          echo "Authority: AMC 90/10 Admin Protocol v1.0.0 (Issue #1063)"
          echo ""

          # Get list of new files added in this PR
          NEW_FILES=$(git diff --name-only --diff-filter=A "origin/${BASE_REF}"...HEAD 2>/dev/null || true)

          if [ -z "$NEW_FILES" ]; then
            echo "✅ No new files added in this PR."
            exit 0
          fi

          VIOLATIONS=0
          VIOLATION_LIST=""

          # Deprecated path patterns — no new files allowed
          while IFS= read -r file; do
            case "$file" in
              .agent-admin/assurance/iaa-prebrief-*.md)
                VIOLATIONS=$((VIOLATIONS + 1))
                VIOLATION_LIST="${VIOLATION_LIST}\n  ❌ ${file} — deprecated: use wave record scope section instead"
                ;;
              .agent-admin/assurance/iaa-token-*.md)
                VIOLATIONS=$((VIOLATIONS + 1))
                VIOLATION_LIST="${VIOLATION_LIST}\n  ❌ ${file} — deprecated: use wave record assurance section instead"
                ;;
              .agent-admin/assurance/iaa-rejection-*.md)
                VIOLATIONS=$((VIOLATIONS + 1))
                VIOLATION_LIST="${VIOLATION_LIST}\n  ❌ ${file} — deprecated: use wave record failure trail instead"
                ;;
              .agent-admin/prehandover/PREHANDOVER_PROOF*.md)
                VIOLATIONS=$((VIOLATIONS + 1))
                VIOLATION_LIST="${VIOLATION_LIST}\n  ❌ ${file} — deprecated: use wave record evaluation section instead"
                ;;
            esac
          done <<< "$NEW_FILES"

          echo ""
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 GOVERNANCE ARTIFACT PATH VIOLATION"
            echo ""
            echo "Found ${VIOLATIONS} file(s) in deprecated admin paths:"
            echo -e "$VIOLATION_LIST"
            echo ""
            echo "Per AMC 90/10 Admin Protocol v1.0.0 (Issue #1063):"
            echo "  - Use a single amc-wave-record-{wave}-{date}.md instead"
            echo "  - Place in: .agent-admin/wave-records/"
            echo "  - Template: .agent-admin/templates/amc-wave-record-template.md"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          else
            echo "✅ All new files are in allowed governance artifact paths."
          fi

      # ------------------------------------------------------------------
      # Verify ECAP ceremony files are present (C1 — templates/checklists gate)
      # Authority: EXECUTION_CEREMONY_ADMINISTRATION_PROTOCOL.md v1.1.0 (ECAP-001)
      # Purpose: PRs that touch governance/** must not silently remove or miss
      #          the required ECAP ceremony templates and checklists.
      # Note: Only runs if the PR touches governance/ paths to avoid noisy
      #       false-positives on non-governance PRs.
      # ------------------------------------------------------------------
      - name: Verify ECAP ceremony files present
        if: steps.bypass_check.outputs.bypass != 'true'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Only check if this PR touches governance/ paths
          GOVERNANCE_CHANGES=$(git diff --name-only "origin/${BASE_REF}"...HEAD 2>/dev/null | \
            grep '^governance/' | wc -l || echo 0)

          if [ "$GOVERNANCE_CHANGES" -eq 0 ]; then
            echo "✅ PR does not touch governance/ — ECAP ceremony file check skipped."
            exit 0
          fi

          echo "=== ECAP Ceremony File Presence Check ==="
          echo "(PR touches governance/ — verifying required ECAP ceremony files)"
          MISSING=()

          # Required ECAP ceremony templates (from ECAP-001 v1.1.0)
          for f in \
            "governance/templates/execution-ceremony-admin/ECAP_RECONCILIATION_SUMMARY.template.md" \
            "governance/templates/execution-ceremony-admin/FOREMAN_ADMIN_READINESS_HANDBACK.template.md" \
            "governance/templates/execution-ceremony-admin/PREHANDOVER.template.md" \
            "governance/templates/execution-ceremony-admin/SESSION_MEMORY.template.md" \
            "governance/templates/execution-ceremony-admin/SCOPE_DECLARATION.template.md" \
            "governance/templates/execution-ceremony-admin/CORRECTION_ADDENDUM.template.md" \
            "governance/templates/execution-ceremony-admin/README.md"; do
            [ -f "$f" ] || MISSING+=("TEMPLATE: $f")
          done

          # Required ECAP ceremony checklists (from ECAP-001 v1.1.0)
          for f in \
            "governance/checklists/execution-ceremony-admin-checklist.md" \
            "governance/checklists/execution-ceremony-admin-reconciliation-matrix.md" \
            "governance/checklists/execution-ceremony-admin-anti-patterns.md"; do
            [ -f "$f" ] || MISSING+=("CHECKLIST: $f")
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 ECAP CEREMONY FILES MISSING"
            echo ""
            echo "The following required ECAP ceremony files are absent from the branch:"
            for m in "${MISSING[@]}"; do echo "  ❌ $m"; done
            echo ""
            echo "Per EXECUTION_CEREMONY_ADMINISTRATION_PROTOCOL.md v1.1.0 (ECAP-001):"
            echo "  - All 7 templates must exist under governance/templates/execution-ceremony-admin/"
            echo "  - All 3 checklists must exist under governance/checklists/execution-ceremony-admin-*.md"
            echo ""
            echo "If this is a layer-down PR, these files should have been included."
            echo "If this is a governance PR, restore the missing files before merging."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ All ECAP ceremony files are present."
