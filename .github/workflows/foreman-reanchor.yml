name: Foreman Handover Re-Anchor

# Fires when a Copilot-authored PR is opened, synchronised, or marked ready-for-review,
# and on-demand when CS2 or the Foreman types /foreman-anchor in a comment.
#
# Narrowed to handover-phase reminder (not a broad mid-wave pulse):
# For synchronize events, a handover keyword check prevents comment spam on routine pushes.
# For opened/ready_for_review events, always post to catch early handover attempts.
on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual activation'

permissions:
  pull-requests: write
  issues: write

jobs:
  foreman-reanchor:
    runs-on: ubuntu-latest

    # Fire for:
    # (a) pull_request_target events on copilot/ branches, OR
    # (b) issue_comment events that contain /foreman-anchor
    if: |
      (
        github.event_name == 'pull_request_target' &&
        (
          startsWith(github.head_ref, 'copilot/') ||
          github.event.pull_request.user.login == 'Copilot'
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/foreman-anchor')
      ) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Resolve checkout ref
        id: resolve_checkout_ref
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;

            if (eventName === 'pull_request_target') {
              core.setOutput('checkout_ref', context.payload.pull_request.head.sha);
              return;
            }

            if (eventName === 'issue_comment' && context.payload.issue && context.payload.issue.pull_request) {
              const pullNumber = context.payload.issue.number;
              try {
                const { data: pull } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pullNumber,
                });
                core.setOutput('checkout_ref', pull.head.sha);
              } catch (e) {
                core.warning(`Could not resolve PR head SHA: ${e.message}`);
                core.setOutput('checkout_ref', '');
              }
              return;
            }

            // workflow_dispatch or plain issue comment — use default branch
            core.setOutput('checkout_ref', '');

      - name: Checkout PR head or default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_checkout_ref.outputs.checkout_ref != '' && steps.resolve_checkout_ref.outputs.checkout_ref || github.ref }}
          fetch-depth: 1

      - name: Read wave-current-tasks.md and check handover keywords
        id: wave_tasks
        env:
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          TASKS_FILE=".agent-workspace/foreman-v2/personal/wave-current-tasks.md"
          if [ -f "$TASKS_FILE" ]; then
            SNIPPET=$(head -c 500 "$TASKS_FILE" | sed "s/\`/'/g")
            echo "tasks_found=true" >> "$GITHUB_OUTPUT"
            echo "tasks_snippet<<EOF_TASKS" >> "$GITHUB_OUTPUT"
            echo "$SNIPPET" >> "$GITHUB_OUTPUT"
            echo "EOF_TASKS" >> "$GITHUB_OUTPUT"
          else
            echo "tasks_found=false" >> "$GITHUB_OUTPUT"
          fi

          # For synchronize events, only post if handover keywords are present in the
          # HEAD commit message. This avoids spam on routine mid-wave pushes.
          # For opened/ready_for_review and non-PR events, always allow the post.
          if [ "$EVENT_ACTION" = "synchronize" ]; then
            COMMIT_MSG=$(git log -1 --format="%s %b" 2>/dev/null | tr '[:upper:]' '[:lower:]' || echo "")
            SHOULD_POST=false
            if echo "$COMMIT_MSG" | grep -qE 'handover|prehandover|phase[[:space:]]4|merge[[:space:]]gate|released|session[[:space:]]closure|opojd'; then
              SHOULD_POST=true
            fi
            echo "should_post=$SHOULD_POST" >> "$GITHUB_OUTPUT"
          else
            echo "should_post=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post foreman handover re-anchor comment
        if: steps.wave_tasks.outputs.should_post == 'true'
        uses: actions/github-script@v7
        env:
          TASKS_FOUND: ${{ steps.wave_tasks.outputs.tasks_found }}
          TASKS_SNIPPET: ${{ steps.wave_tasks.outputs.tasks_snippet }}
        with:
          script: |
            const tasksFound = process.env.TASKS_FOUND === 'true';
            const tasksSnippet = process.env.TASKS_SNIPPET || '';

            const prNumber = context.payload.pull_request?.number
              || context.payload.issue?.number;

            if (!prNumber) {
              core.warning('Could not determine PR/issue number — skipping re-anchor comment.');
              return;
            }

            // Idempotency guard: skip if a re-anchor comment was already posted recently
            const MARKER = '<!-- foreman-handover-reanchor -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 20,
              sort: 'created',
              direction: 'desc',
            });
            const alreadyPosted = comments.some(c => c.body && c.body.includes(MARKER));
            if (alreadyPosted) {
              core.notice('Foreman handover re-anchor comment already posted — skipping duplicate.');
              return;
            }

            const tasksSection = tasksFound
              ? `\n\n**Outstanding wave tasks** (from \`.agent-workspace/foreman-v2/personal/wave-current-tasks.md\`):\n\`\`\`\n${tasksSnippet}\n...\n\`\`\``
              : '\n\n> ℹ️ No `wave-current-tasks.md` found — read `.agent-workspace/foreman-v2/memory/` latest session for wave state.';

            const obligationLines = [
              '1. ✅ **IAA Invocation** (Phase 4 §4.4): Has this PR received an `ASSURANCE-TOKEN`?',
              '   - If NO → invoke IAA now: `task(agent_type: "independent-assurance-agent")` — provide wave record path + session memory path + evidence bundle',
              '   - If you received a `REJECTION-PACKAGE` → fix all cited findings, re-commit, re-invoke IAA directly (you own this loop)',
              '2. ✅ **Token Ceremony** (Phase 4 §4.5): Is the `PHASE_B_BLOCKING_TOKEN` recorded in **wave record section 5** (`.agent-admin/wave-records/amc-wave-record-{slug}-{date}.md`)? ⚠️ Do NOT create a standalone `.agent-admin/assurance/iaa-token-*.md` file — that artifact location is retired (AMC 90/10 Protocol — Issue #1063). Token lives in wave record section 5 only.',
              '3. ✅ **Pre-IAA Commit-State Gate** (Phase 4 §4.3a): Are the wave record (sections 1–4), session memory, and evidence artifacts all committed before IAA invocation?',
              '4. ✅ **Pre-PR Blocking Gate** (PHCP-001 §4): Are `closeout_sweep_performed`, `wave_checklist_retired_from_kickoff_state`, `control_surfaces_finalized`, `handover_bundle_self_consistent`, and `governing_issue_role_registry_completed` all `YES` in the wave record §3c? A PR MUST NOT be opened as review-ready if these are absent or non-pass.',
              '5. ✅ **§4.3 Parity**: Has the merge gate parity check been run locally? All required checks must pass before Phase 4.',
              '6. ✅ **QP**: Has any builder returned a delivery requiring Quality-Professor review? If yes → execute QP gate now (Phase 3 Step 3.5).',
              '7. 🚫 **NEVER write production code, schemas, migrations, or tests** — if you find yourself editing source files, STOP and delegate to the correct builder (NO-IMPLEMENT-001).',
              `8. ✅ **OPOJD**: One pass, one job done. If this wave is complete → write session memory, ensure wave record sections 1–5 complete, and close cleanly.${tasksSection}`,
            ].join('\n');

            const body = [
              `${MARKER}`,
              '## 🔄 FOREMAN HANDOVER RE-ANCHOR',
              '',
              '@copilot — You are **foreman-v2-agent** (contract v6.2.0 / 2.8.0, class: foreman). You do **NOT** build. You **orchestrate**.',
              '',
              '### Phase 4 Handover Checklist — check each before proceeding:',
              obligationLines,
              '',
              '**Authority**: CS2 (Johan Ras / @APGI-cmy) | Contract: foreman-v2-agent v6.2.0 / 2.8.0',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
