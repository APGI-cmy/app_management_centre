name: Agent QA Boundary Enforcement

# CI CLASSIFICATION: Hard Gate
# Purpose: Enforces agent-scoped QA boundaries (Builder/FM/Governance QA separation)
# Failure Semantics:
#   - Wrong agent attribution → Catastrophic governance violation → Block merge + escalation
#   - Missing QA report (when expected) → Advisory
#   - Infrastructure failures → Explicit infra-failure signal → Retry + Comment
# Timeout: 10 minutes (simple validation only)
# See: .github/CI_CLASSIFICATION.md

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop

# Explicit, least-privilege permissions
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  enforce-agent-boundaries:
    name: Enforce Agent-Scoped QA Boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Detect Documentation-Only PR
        id: detect-doc-only
        run: |
          echo "🔍 Detecting PR type..."
          
          # Get changed files (fetch main for comparison)
          git fetch origin main --depth=50 2>/dev/null || echo "Note: Could not fetch main branch"
          
          # Get list of changed files
          if git rev-parse origin/main >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only origin/main...HEAD || echo "")
          else
            # Fallback: check current commit changes only
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD || echo "")
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check for code/workflow changes
          if echo "$CHANGED_FILES" | grep -qE '\.(js|ts|jsx|tsx|py)$|\.github/workflows/.*\.ya?ml$|package\.json$|tsconfig\.json$|tests/|__tests__/|\.test\.|\.spec\.'; then
            echo "doc_only=false" >> $GITHUB_OUTPUT
            echo "📝 PR Type: Code/Workflow Changes"
          else
            echo "doc_only=true" >> $GITHUB_OUTPUT
            echo "📝 PR Type: Documentation-Only"
          fi
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Find QA Reports in PR
        id: find-reports
        run: |
          echo "🔍 Searching for QA reports in repository..."
          
          # Find all QA report JSON files
          QA_REPORTS=$(find . -type f \( -name "*qa-report*.json" -o -name "*qa_report*.json" \) | tr '\n' ' ')
          
          if [ -z "$QA_REPORTS" ]; then
            echo "ℹ️ No QA reports found in this PR"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Found QA reports: $QA_REPORTS"
            echo "reports=$QA_REPORTS" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Check for Evidence-Based Validation (BL-027/028)
        if: steps.find-reports.outputs.found == 'true'
        id: evidence_check
        run: |
          echo "=== Evidence-Based Validation Check (BL-027/028) ==="
          echo "Gate: Agent Boundary Validation"
          echo ""

          # Look for PREHANDOVER_PROOF with this gate documented
          if [ -f "PREHANDOVER_PROOF.md" ] && grep -q "agent.*boundar\|Agent.*Boundar\|QA.*Boundar" PREHANDOVER_PROOF.md; then
            echo "✅ Found PREHANDOVER_PROOF.md with Agent Boundary validation"
            echo "✅ ACCEPTING evidence-based validation per BL-027/028"
            echo "skip_execution=true" >> $GITHUB_OUTPUT
          elif ls PREHANDOVER_PROOF_*.md 1> /dev/null 2>&1 && grep -q "agent.*boundar\|Agent.*Boundar\|QA.*Boundar" PREHANDOVER_PROOF_*.md 2>/dev/null; then
            echo "✅ Found PREHANDOVER_PROOF with Agent Boundary validation"
            echo "✅ ACCEPTING evidence-based validation per BL-027/028"
            echo "skip_execution=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  No evidence-based validation found - proceeding with script execution"
            echo "skip_execution=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Validate Agent Boundaries
        if: steps.find-reports.outputs.found == 'true' && steps.evidence_check.outputs.skip_execution != 'true'
        id: validate
        run: |
          echo "🔒 Validating agent-scoped QA boundaries..."
          
          if [ -f governance/scripts/validate_agent_boundaries.py ]; then
            if python governance/scripts/validate_agent_boundaries.py \
              --reports "${{ steps.find-reports.outputs.reports }}" \
              --current-repo "${{ github.repository }}"; then
              echo "outcome=success" >> $GITHUB_OUTPUT
            else
              echo "outcome=code_failure" >> $GITHUB_OUTPUT
            fi
          else
            echo "::warning::Validation script not found - Infrastructure issue"
            echo "outcome=infra_failure" >> $GITHUB_OUTPUT
            echo "infra_failure_type=missing_validation_script" >> $GITHUB_OUTPUT
          fi
      
      - name: Accept Evidence-Based Validation
        if: steps.find-reports.outputs.found == 'true' && steps.evidence_check.outputs.skip_execution == 'true'
        id: validate_evidence
        run: |
          echo "outcome=success" >> $GITHUB_OUTPUT
          echo "✅ Agent Boundary validation ACCEPTED (evidence-based per BL-027/028)"
      
      - name: Check Validation Result
        if: steps.find-reports.outputs.found == 'true'
        run: |
          OUTCOME="${{ steps.validate.outputs.outcome }}"
          EVIDENCE_OUTCOME="${{ steps.validate_evidence.outputs.outcome }}"
          
          # Use evidence outcome if validation was skipped
          if [ -n "$EVIDENCE_OUTCOME" ]; then
            OUTCOME="$EVIDENCE_OUTCOME"
          fi
          
          echo "Validation outcome: $OUTCOME"
          
          if [ "$OUTCOME" = "code_failure" ]; then
            echo "❌ Validation failed - code/governance issue"
            exit 1
          elif [ "$OUTCOME" = "infra_failure" ]; then
            echo "ℹ️ Infrastructure failure detected - will report as success with commentary"
          else
            echo "✅ Validation succeeded"
          fi
      
      - name: Report Success
        if: success() && steps.find-reports.outputs.found == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ✅ **Agent QA Boundary Enforcement PASSED**
              
              All QA reports correctly attributed to appropriate agents:
              - Builder QA by Builder agents only ✅
              - Governance QA by Governance agents only ✅
              - FM QA by FM agents only ✅
              
              No cross-agent QA execution detected.
              Agent-scoped QA boundaries respected.
              
              **Gatekeeper 1 approves governance compliance.**
              `
            })
      
      - name: No Reports Found (Documentation-Only)
        if: steps.find-reports.outputs.found == 'false' && steps.detect-doc-only.outputs.doc_only == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ✅ **Agent QA Boundary Enforcement - SKIP** (Documentation-Only PR)
              
              **Outcome**: Non-blocking SKIP  
              **Reason**: No QA reports present in documentation-only PR  
              **Status**: This gate does not block merge
              
              ---
              
              **Documentation-Only PR**: No code changes detected  
              **QA Reports**: None (expected for documentation-only changes)  
              **Boundary Violations**: None possible (no QA reports to validate)
              
              ---
              
              **Gate Status**: ✅ PASS (via informational skip)
              `
            })
      
      - name: No Reports Found (Code/Workflow PR)
        if: steps.find-reports.outputs.found == 'false' && steps.detect-doc-only.outputs.doc_only == 'false' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ℹ️ **Agent QA Boundary Enforcement - No Reports**
              
              No QA reports found in this PR.
              
              This is acceptable if:
              - This is FM repository (uses FM QA, not Builder QA)
              - QA reports will be added in subsequent commits
              - This is a minor change not requiring QA
              
              If QA reports are expected, ensure they are:
              - Named with pattern \`*qa-report*.json\` or \`*qa_report*.json\`
              - Committed to the repository
              - In JSON format with proper agent attribution
              `
            })
      
      - name: Report Infrastructure Failure
        if: always() && steps.validate.outputs.outcome == 'infra_failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const failureType = "${{ steps.validate.outputs.infra_failure_type }}" || "unknown";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              ⚠️ **Infrastructure Failure Detected - Agent QA Boundary Enforcement**
              
              The Agent QA Boundary enforcement workflow encountered an infrastructure issue:
              
              **Failure Type**: \`${failureType}\`
              **Workflow Conclusion**: ✅ Success (with infrastructure caveat)
              
              ---
              
              ## What This Means
              
              - This is NOT a code or governance failure
              - The workflow cannot complete validation due to missing infrastructure components
              - **Merge is NOT blocked** by this workflow
              - Infrastructure issue requires attention but does not indicate code problems
              
              ---
              
              ## Required Action
              
              1. Review workflow logs for details
              2. Verify validation script exists at expected path
              3. Fix infrastructure issue in separate PR
              4. Re-run this workflow once infrastructure is fixed
              
              ---
              
              **Note**: Per WS4 infrastructure failure semantics, this workflow reports success with explicit commentary rather than blocking the PR on infrastructure issues.
              `
            })
      
      - name: Report Catastrophic Violation
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Create catastrophic failure issue
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 CATASTROPHIC: Agent QA Boundary Violation",
              labels: ['catastrophic-failure', 'governance-violation', 'requires-escalation'],
              body: `
              # CATASTROPHIC GOVERNANCE VIOLATION
              
              **Type**: Agent-Scoped QA Boundary Violation  
              **PR**: #${context.issue.number}  
              **Commit**: ${context.sha}  
              **Detected**: ${new Date().toISOString()}
              
              ---
              
              ## Violation
              
              Agent-scoped QA boundary violation detected in PR #${context.issue.number}.
              
              This is a **catastrophic governance violation** that breaks fundamental separation of duties in QA execution.
              
              ---
              
              ## Possible Causes
              
              - ❌ Builder agent executed Governance QA
              - ❌ Governance agent executed Builder QA
              - ❌ FM agent executed Builder QA
              - ❌ QA report missing agent attribution
              - ❌ QA report attributed to wrong agent
              
              ---
              
              ## REQUIRED ACTIONS (Mandatory)
              
              1. ⛔ **HALT** all related work immediately
              2. 🔍 **IDENTIFY** which agent executed wrong QA scope
              3. 🗑️ **REMOVE** violating QA report(s)
              4. ✅ **EXECUTE** QA in correct agent scope
              5. 📝 **UPDATE** agent contract to prevent recurrence
              6. ⬆️ **ESCALATE** to @JohanRas788 (Owner)
              
              ---
              
              ## Impact
              
              - Merge **BLOCKED** until violation resolved
              - PR cannot proceed
              - Root cause analysis **MANDATORY**
              - Prevention measures **REQUIRED**
              
              ---
              
              ## References
              
              - [Agent-Scoped QA Boundaries](../governance/alignment/AGENT_SCOPED_QA_BOUNDARIES.md)
              - [Two-Gatekeeper Model](../governance/alignment/TWO_GATEKEEPER_MODEL.md)
              - [PR Gate Failure Handling](../governance/alignment/PR_GATE_FAILURE_HANDLING_PROTOCOL.md)
              
              ---
              
              **Authority**: Corporate Governance Canon  
              **Enforcement**: Automatic (no override permitted)  
              **Escalation**: Mandatory to Owner
              `
            });
            
            // Comment on PR
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
              🚨 **CATASTROPHIC GOVERNANCE VIOLATION**
              
              Agent-scoped QA boundary violation detected.
              
              This is a **catastrophic governance violation** requiring immediate escalation.
              
              **Catastrophic Failure Issue Created**: #${issue.data.number}
              
              ---
              
              ## REQUIRED ACTIONS
              
              1. ⛔ HALT all related work
              2. 🔍 Review workflow logs for violation details
              3. 🗑️ Remove violating QA report
              4. ✅ Execute QA in correct agent scope
              5. 📝 Update agent contract
              6. ⬆️ Escalate to @JohanRas788
              
              ---
              
              **Merge BLOCKED until violation resolved.**
              
              See issue #${issue.data.number} for full details.
              `
            });
      
      - name: Workflow Success
        if: always()
        run: |
          OUTCOME="${{ steps.validate.outputs.outcome }}"
          DOC_ONLY="${{ steps.detect-doc-only.outputs.doc_only }}"
          FOUND="${{ steps.find-reports.outputs.found }}"
          
          if [ "$DOC_ONLY" = "true" ] && [ "$FOUND" = "false" ]; then
            echo "✅ Agent QA Boundary Enforcement - SKIP (Documentation-Only PR)"
            echo "Status: Non-blocking, no QA reports to validate"
          elif [ "$OUTCOME" = "infra_failure" ]; then
            echo "✅ Agent QA Boundary Enforcement completed successfully (infrastructure failure handled)"
          elif [ "$OUTCOME" = "code_failure" ]; then
            echo "❌ Agent QA Boundary Enforcement failed (code/governance violation)"
            exit 1
          elif [ -z "$OUTCOME" ]; then
            echo "✅ Agent QA Boundary Enforcement completed successfully (no reports found - acceptable)"
          else
            echo "✅ Agent QA Boundary Enforcement completed successfully"
          fi
          exit 0
