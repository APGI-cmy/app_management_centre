# Authority: INDEPENDENT_ASSURANCE_AGENT_CANON.md, AGENT_HANDOVER_AUTOMATION.md, foreman-v2-agent contract Phase 0
# Purpose: Automated governance gap detection — catch missing pre-brief, missing IAA token at handover, and work without PR
# Implements: Living Agent System v6.x.0 proactive assurance layer
# AMC-specific: Gap 3 is HARD enforcement (blocking); scans both .agent-workspace/ and root PREHANDOVER_PROOF_*.md

name: Governance Watchdog

on:
  push:
    branches-ignore:
      - main
  pull_request_target:
    types: [opened, ready_for_review, synchronize]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:

  # ── Gap 1 ─────────────────────────────────────────────────────────────────
  # Foreman commits to a branch with no open PR
  gap1-no-pr-for-branch:
    name: "watchdog/gap1-no-pr-for-branch"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Check for open PR and post alert if missing
        uses: actions/github-script@v7
        env:
          PUSH_BRANCH: ${{ github.ref_name }}
          PUSH_SHA: ${{ github.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        with:
          script: |
            const branch = process.env.PUSH_BRANCH;
            const sha = process.env.PUSH_SHA;

            // Guard: exempt governance/liaison/ripple/dependabot/copilot branches
            const exemptPrefixes = [
              'governance/',
              'ripple-',
              'governance-alignment',
              'dependabot/',
              'copilot/',
            ];
            for (const prefix of exemptPrefixes) {
              if (branch.startsWith(prefix)) {
                core.info(`Branch '${branch}' is exempt (matches prefix '${prefix}') — skipping Gap 1.`);
                return;
              }
            }

            // Guard: skip if ALL changed files are pure governance artifacts
            let changedFiles = [];
            try {
              const before = process.env.PUSH_BEFORE;
              if (before && before !== '0000000000000000000000000000000000000000') {
                const compareResult = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `${before}...${sha}`,
                });
                changedFiles = (compareResult.data.files || []).map(f => f.filename);
              } else {
                changedFiles = ['__unknown__'];
              }
            } catch (e) {
              core.warning(`Could not retrieve changed files: ${e.message}`);
              changedFiles = ['__unknown__'];
            }

            const governanceOnlyPrefixes = ['governance/', '.agent-workspace/', '.agent-admin/'];
            const allGovernanceOnly = changedFiles.length > 0 &&
              changedFiles.every(f => governanceOnlyPrefixes.some(p => f.startsWith(p)));

            if (allGovernanceOnly) {
              core.info('All changed files are governance artifacts — skipping Gap 1.');
              return;
            }

            // Check for open PR on this branch
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
              per_page: 1,
            });

            if (pulls.length > 0) {
              core.info(`Open PR #${pulls[0].number} exists for branch '${branch}' — no gap detected.`);
              return;
            }

            // No open PR — post commit comment alert
            const body = [
              '## ⚠️ GOVERNANCE WATCHDOG — No PR Detected',
              '',
              `@copilot **Foreman attention required.** Commits were pushed to branch \`${branch}\` but no open PR exists.`,
              '',
              'Per the foreman-v2-agent contract (Phase 1 Step 1.8):',
              '- A PR must exist before wave work begins',
              '- The IAA Pre-Brief is triggered automatically on the first push **to an open PR branch**',
              '- Without an open PR, the Pre-Brief cannot fire and IAA cannot audit your wave',
              '',
              '**Action required:**',
              '1. Open a PR immediately (DRAFT is acceptable)',
              '2. The pre-brief injection will fire automatically when the PR is opened / the branch is pushed again',
              '3. Do not proceed with further implementation commits until the pre-brief is confirmed',
              '',
              '*Governance Watchdog — automated gap detection | Authority: foreman-v2-agent contract Phase 0*',
            ].join('\n');

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body,
            });

            core.warning(`Gap 1 alert posted: no open PR found for branch '${branch}'.`);

  # ── Gap 2A ────────────────────────────────────────────────────────────────
  # Pre-Brief gate: must run before any IAA second-tier artifact processing.
  gap2a-prebrief-gate-before-iaa-second-tier:
    name: "watchdog/gap2a-prebrief-gate"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' || github.event.action == 'ready_for_review')
    outputs:
      prebrief_gate: ${{ steps.gate_final.outputs.prebrief_gate }}
    steps:
      - name: Check PR for ripple/liaison guard
        id: guard
        uses: actions/github-script@v7
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        with:
          script: |
            const title = (process.env.PR_TITLE || '').toLowerCase();
            const labelsRaw = process.env.PR_LABELS || '[]';
            let labels = [];
            try { labels = JSON.parse(labelsRaw).map(l => (l.name || '').toLowerCase()); } catch {}

            if (
              title.includes('[wip] update governance artifacts') ||
              title.includes('ripple:')
            ) {
              core.setOutput('skip', 'true');
              core.info('Guard: PR title matches ripple/liaison pattern — skipping Gap 2A.');
              return;
            }

            const hasLiaison = labels.includes('agent:liaison');
            const hasGovernance = labels.includes('governance');
            const hasAutomated = labels.includes('automated');
            if (hasLiaison || (hasGovernance && hasAutomated)) {
              core.setOutput('skip', 'true');
              core.info('Guard: PR labels indicate liaison/automated governance PR — skipping Gap 2A.');
              return;
            }

            core.setOutput('skip', 'false');

      - name: Checkout PR head branch
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Check for IAA pre-brief artifact and set gate output
        id: gate
        if: steps.guard.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            let prebriefExists = false;
            try {
              if (fs.existsSync('.agent-admin/assurance')) {
                const allFilesRaw = execSync(
                  'find .agent-admin/assurance -name "iaa-prebrief-*.md"',
                  { encoding: 'utf8' }
                ).trim();
                if (allFilesRaw.length > 0) {
                  const allFiles = allFilesRaw.split('\n').filter(Boolean);
                  prebriefExists = allFiles.some(f => {
                    try {
                      return !fs.readFileSync(f, 'utf8').toLowerCase().includes('superseded');
                    } catch {
                      return false;
                    }
                  });
                }
              }
            } catch (e) {
              prebriefExists = false;
            }

            if (prebriefExists) {
              core.info('IAA pre-brief artifact found — Gap 2A gate: CLEAR.');
              core.setOutput('prebrief_gate', 'clear');
              return;
            }

            const branch = process.env.PR_BRANCH;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);

            // Idempotency guard
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 10,
                sort: 'created',
                direction: 'desc',
              });
              if (comments.some(c => c.body && c.body.includes('<!-- gap2a-prebrief-gate-blocked -->'))) {
                core.info('Gap 2A: blocking comment already posted — skipping to prevent spam.');
                core.setOutput('prebrief_gate', 'blocked');
                return;
              }
            } catch (e) {
              core.warning(`Gap 2A: could not check existing comments for idempotency: ${e.message}`);
            }

            core.setOutput('prebrief_gate', 'blocked');

            const body = [
              '<!-- gap2a-prebrief-gate-blocked -->',
              '## 🛑 IAA SECOND-TIER GATE — Pre-Brief Artifact Missing',
              '',
              'The IAA cannot proceed with second-tier verification because **no pre-brief artifact exists** for this wave.',
              '',
              '**Agent instruction**: Stop all handover preparation. Return to Step 1.8. Invoke the IAA Pre-Brief now and commit the artifact to `.agent-admin/assurance/iaa-prebrief-<slug>.md` before continuing.',
              '',
              '**CS2 escalation**: The pre-brief reminder workflow (`iaa-prebrief-inject.yml`) did not prevent this gap.',
              '',
              `@APGI-cmy — IAA second-tier gate blocked on PR for branch \`${branch}\`. Pre-brief artifact absent.`,
              '',
              '*Governance Watchdog — Gap 2A | Authority: foreman-v2-agent contract Step 1.8*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            core.warning(`Gap 2A: Pre-brief artifact missing on branch '${branch}'. Second-tier gate BLOCKED.`);

      - name: Set gate to clear when guard exempts this PR
        id: gate_exempt
        if: steps.guard.outputs.skip == 'true'
        run: echo "prebrief_gate=clear" >> "$GITHUB_OUTPUT"

      - name: Consolidate gate output
        id: gate_final
        if: always()
        run: |
          GATE="${{ steps.gate.outputs.prebrief_gate }}"
          GATE_EXEMPT="${{ steps.gate_exempt.outputs.prebrief_gate }}"
          if [ -n "$GATE" ]; then
            echo "prebrief_gate=$GATE" >> "$GITHUB_OUTPUT"
          elif [ -n "$GATE_EXEMPT" ]; then
            echo "prebrief_gate=$GATE_EXEMPT" >> "$GITHUB_OUTPUT"
          else
            echo "prebrief_gate=clear" >> "$GITHUB_OUTPUT"
          fi

  # ── Gap 2 ─────────────────────────────────────────────────────────────────
  # PR marked ready for review but no IAA pre-brief artifact exists
  gap2-ready-pr-missing-prebrief:
    name: "watchdog/gap2-ready-pr-missing-prebrief"
    runs-on: ubuntu-latest
    needs: [gap2a-prebrief-gate-before-iaa-second-tier]
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'ready_for_review' ||
       (github.event.action == 'opened' && !github.event.pull_request.draft)) &&
      needs.gap2a-prebrief-gate-before-iaa-second-tier.outputs.prebrief_gate != 'blocked'
    steps:
      - name: Check PR for ripple/liaison guard
        id: guard
        uses: actions/github-script@v7
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        with:
          script: |
            const title = (process.env.PR_TITLE || '').toLowerCase();
            const labelsRaw = process.env.PR_LABELS || '[]';
            let labels = [];
            try { labels = JSON.parse(labelsRaw).map(l => (l.name || '').toLowerCase()); } catch {}

            if (
              title.includes('[wip] update governance artifacts') ||
              title.includes('ripple:')
            ) {
              core.setOutput('skip', 'true');
              return;
            }

            const hasLiaison = labels.includes('agent:liaison');
            const hasGovernance = labels.includes('governance');
            const hasAutomated = labels.includes('automated');
            if (hasLiaison || (hasGovernance && hasAutomated)) {
              core.setOutput('skip', 'true');
              return;
            }

            core.setOutput('skip', 'false');

      - name: Checkout PR head branch
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Check for IAA pre-brief artifact and post alert if missing
        if: steps.guard.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            let prebriefExists = false;
            try {
              if (fs.existsSync('.agent-admin/assurance')) {
                const allFilesRaw = execSync(
                  'find .agent-admin/assurance -name "iaa-prebrief-*.md"',
                  { encoding: 'utf8' }
                ).trim();
                if (allFilesRaw.length > 0) {
                  const allFiles = allFilesRaw.split('\n').filter(Boolean);
                  prebriefExists = allFiles.some(f => {
                    try {
                      return !fs.readFileSync(f, 'utf8').toLowerCase().includes('superseded');
                    } catch {
                      return false;
                    }
                  });
                }
              }
            } catch (e) {
              prebriefExists = false;
            }

            if (prebriefExists) {
              core.info('IAA pre-brief artifact found — no gap detected.');
              return;
            }

            const branch = process.env.PR_BRANCH;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);

            const body = [
              '## ⚠️ GOVERNANCE WATCHDOG — Pre-Brief Missing for Ready PR',
              '',
              `@copilot **Foreman attention required.** This PR is **open for review** but **no IAA pre-brief artifact** was found on branch \`${branch}\`.`,
              '',
              'Per Phase 0 (Step 1.8) of the foreman-v2-agent contract:',
              '- A pre-wave pre-brief is mandatory **before** wave work begins',
              '- The pre-brief must exist before this PR can proceed to the merge gate',
              '',
              `**Required:** IAA pre-brief artifact at \`.agent-admin/assurance/iaa-prebrief-<slug>.md\``,
              '',
              '*Governance Watchdog — Gap 2 | Authority: foreman-v2-agent contract Step 1.8*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            core.warning(`Gap 2 alert posted on PR #${prNumber}: no IAA pre-brief found on branch '${branch}'.`);

  # ── Gap 3 ─────────────────────────────────────────────────────────────────
  # PREHANDOVER proof pushed with iaa_audit_token: PENDING while handover language is present
  # AMC: HARD enforcement (fail-fast blocking), scans both .agent-workspace/ and root PREHANDOVER_PROOF_*.md
  gap3-prehandover-pending-token:
    name: "watchdog/gap3-prehandover-pending-token"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' && (github.event.action == 'synchronize' || github.event.action == 'opened' || github.event.action == 'ready_for_review')
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect PREHANDOVER changes and check for PENDING token
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          AFTER_SHA: ${{ github.event.pull_request.head.sha || github.event.after }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          ACTION="$EVENT_ACTION"
          # Collect ALL matching PREHANDOVER files rather than stopping at the first match,
          # so that a compliant first file cannot mask another file that still has PENDING token.
          declare -a MATCHED_FILES=()

          if [[ "$ACTION" == "synchronize" ]]; then
            if [[ "$BEFORE_SHA" =~ ^[0-9a-f]{40}$ ]] && [[ "$AFTER_SHA" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Using diff range $BEFORE_SHA...$AFTER_SHA"
            else
              echo "SHAs not available or invalid; falling back to HEAD-only diff"
              BEFORE_SHA=""
            fi

            # Collect all PREHANDOVER*.md files from the PR diff (both paths)
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              basename_f=$(basename "$f")
              if [[ "$basename_f" == PREHANDOVER*.md ]]; then
                MATCHED_FILES+=("$f")
              fi
            done < <(
              if [ -n "$BEFORE_SHA" ]; then
                git diff --name-only "$BEFORE_SHA...$AFTER_SHA" 2>/dev/null || true
              else
                git diff-tree --no-commit-id --name-only -r HEAD 2>/dev/null || true
              fi
            )
          else
            # For opened/ready_for_review: deterministically collect from both locations
            # AMC: scan .agent-workspace/ PREHANDOVER files AND root PREHANDOVER_PROOF_*.md
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              MATCHED_FILES+=("$f")
            done < <(
              {
                find .agent-workspace -name "PREHANDOVER*.md" -print 2>/dev/null
                find . -maxdepth 1 -name "PREHANDOVER_PROOF_*.md" -print 2>/dev/null
              } | LC_ALL=C sort -u
            )
          fi

          if [ "${#MATCHED_FILES[@]}" -eq 0 ]; then
            echo "prehandover_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "prehandover_changed=true" >> "$GITHUB_OUTPUT"
          # Report the first file for reference in the comment step
          echo "prehandover_file=${MATCHED_FILES[0]}" >> "$GITHUB_OUTPUT"

          # Check ALL matched files — any file with iaa_audit_token: PENDING triggers the gap.
          # Files that do not contain the iaa_audit_token field at all are skipped (not applicable),
          # to avoid false positives from historical PREHANDOVER docs or templates.
          TOKEN_PENDING=false
          for candidate in "${MATCHED_FILES[@]}"; do
            if grep -q 'iaa_audit_token:' "$candidate"; then
              TOKEN_VALUE=$(grep 'iaa_audit_token:' "$candidate" | head -1 | sed 's/.*iaa_audit_token:[[:space:]]*//')
              TOKEN_TRIMMED=$(echo "$TOKEN_VALUE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              if echo "$TOKEN_TRIMMED" | grep -qiE '^PENDING$'; then
                TOKEN_PENDING=true
                echo "  → PENDING token found in: $candidate"
                break
              fi
            fi
          done

          if [ "$TOKEN_PENDING" = true ]; then
            echo "token_pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "token_pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check handover keywords and enforce blocking failure if gap detected
        id: gap3_check
        if: steps.detect.outputs.prehandover_changed == 'true' && steps.detect.outputs.token_pending == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PREHANDOVER_FILE: ${{ steps.detect.outputs.prehandover_file }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const prBody = (process.env.PR_BODY || '').toLowerCase();

            let commitMsg = '';
            try {
              const { data: commit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: process.env.HEAD_SHA,
              });
              commitMsg = (commit.commit.message || '').toLowerCase();
            } catch (e) {
              core.warning(`Could not fetch commit message: ${e.message}`);
            }

            const fs = require('fs');
            let prehandoverContent = '';
            const prehandoverFile = process.env.PREHANDOVER_FILE || '';
            try {
              if (prehandoverFile && !prehandoverFile.includes('..') && fs.existsSync(prehandoverFile)) {
                prehandoverContent = fs.readFileSync(prehandoverFile, 'utf8').toLowerCase();
              }
            } catch (e) {
              core.warning(`Could not read PREHANDOVER file content: ${e.message}`);
            }

            const combined = prBody + ' ' + commitMsg + ' ' + prehandoverContent;

            const handoverKeywords = [
              'session summary',
              'wave closure',
              'wave closed',
              'phase complete',
              'handover',
              'prehandover',
              'ready for review',
              'merge ready',
            ];

            const hasHandoverLanguage = handoverKeywords.some(kw => combined.includes(kw));

            if (!hasHandoverLanguage) {
              core.info('No handover language detected — skipping Gap 3 enforcement.');
              return;
            }

            // Idempotency guard
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 10,
              sort: 'created',
              direction: 'desc',
            });

            const alreadyPosted = comments.some(c =>
              c.body && c.body.includes('GOVERNANCE WATCHDOG — IAA Token Missing')
            );

            if (alreadyPosted) {
              core.info('Gap 3 alert already posted in recent comments — skipping to prevent spam.');
              // Still fail the job — idempotency only skips the comment, not the enforcement
              core.setFailed('Gap 3 ENFORCED: PREHANDOVER with PENDING token + handover language detected. IAA token required before merge.');
              return;
            }

            const body = [
              '## 🔴 GOVERNANCE WATCHDOG — IAA Token Missing at Handover [AMC HARD ENFORCEMENT]',
              '',
              '@copilot **Foreman attention required.** A `PREHANDOVER` proof was detected on this PR with `iaa_audit_token: PENDING`, but handover or wave-closure language was detected.',
              '',
              'Per FAIL-ONLY-ONCE A-014 (foreman-v2-agent registry) and AGENT_HANDOVER_AUTOMATION.md §4.3b:',
              '- The IAA **must** be invoked **before** handover (Phase 4 Step 4.3b)',
              '- The `ASSURANCE-TOKEN` must be committed to `.agent-admin/assurance/iaa-token-*.md` with a non-empty `PHASE_B_BLOCKING_TOKEN:`',
              '- Handing over with `iaa_audit_token: PENDING` is an automatic merge gate failure (A-021)',
              '',
              '**⛔ THIS CHECK IS HARD-ENFORCED IN AMC — CI WILL FAIL UNTIL RESOLVED**',
              '',
              '**Detected:** `PREHANDOVER` proof with `iaa_audit_token: PENDING` + handover language',
              '**Required:** Phase 4 Step 4.3a → Phase 4 Step 4.3b (IAA invocation) → Phase 4 Step 4.3c (token ceremony)',
              '',
              '### Action required:',
              '1. Ensure all PREHANDOVER artifacts are committed (Phase 4 Step 4.3a)',
              '2. Invoke IAA: `task(agent_type: "independent-assurance-agent")` — provide PREHANDOVER proof + session memory + evidence bundle',
              '3. If IAA issues `REJECTION-PACKAGE` → fix all cited findings, regenerate PREHANDOVER proof (new commit), re-invoke IAA',
              '4. Commit the IAA token file to `.agent-admin/assurance/iaa-token-*.md` with `PHASE_B_BLOCKING_TOKEN:` non-empty',
              '',
              '*Governance Watchdog — Gap 3 AMC HARD ENFORCEMENT | Authority: foreman-v2-agent FAIL-ONLY-ONCE A-014, A-021, AGENT_HANDOVER_AUTOMATION.md §4.3b*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            // AMC: HARD enforcement — fail the CI check
            core.setFailed('Gap 3 ENFORCED: PREHANDOVER with PENDING token + handover language detected. IAA token required. See comment for remediation steps.');
