name: IAA and ECAP Hard Gate

# Authority: PPEIA-001, EFIA-001, AAEV-001, ECAP-001 v1.3.0
# Issue:     app_management_centre#1154 — Port ISMS IAA and ECAP hard merge gates into AMC
# Purpose:   Hard-block PR merge when:
#              (a) IAA final assurance evidence is missing, stale, or mislinked; OR
#              (b) Protected-path PR lacks valid ECAP / admin ceremony evidence
#
# Implements: AC1 IAA final assurance hard gate
#             AC2 Wave-record token linkage hardening
#             AC3 ECAP/admin ceremony hard gate for protected paths
#             AC4 Anti-self-certification rule
#             AC5 CS2 waiver path
#             AC6 AMC token format compatibility
#             AC7 Current-head freshness
#             AC8 Post-IAA final-state normalization
#
# Gate classification: HARD GATE — failures block merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ============================================================================
  # JOB 1: Classify PR — determine which gates apply
  # ============================================================================
  classify-protected-paths:
    name: "iaa-ecap/classify-protected-paths"
    runs-on: ubuntu-latest
    outputs:
      is_protected_path_pr: ${{ steps.classify.outputs.is_protected_path_pr }}
      requires_iaa:          ${{ steps.classify.outputs.requires_iaa }}
      is_auto_bypass:        ${{ steps.classify.outputs.is_auto_bypass }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Classify PR and detect bypass conditions
        id: classify
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "=== IAA / ECAP Gate — PR Classification ==="
          echo "Authority: PPEIA-001, EFIA-001 | Issue: #1154"
          echo ""

          # ------------------------------------------------------------------
          # Bypass: automated governance alignment / layer-down PRs
          # ------------------------------------------------------------------
          AUTO_BYPASS=false
          if [[ ( "$PR_LABELS" == *"governance"* && "$PR_LABELS" == *"automated"* && \
                  "$PR_LABELS" == *"agent:liaison"* ) || \
               "$PR_BRANCH" == "governance-alignment-auto" || \
               "$PR_LABELS" == *"layer-down"* || \
               "$PR_BRANCH" == *"layer-down"* ]]; then
            echo "✅ Automated governance / layer-down PR — bypassing IAA/ECAP gate."
            AUTO_BYPASS=true
          fi

          echo "is_auto_bypass=$AUTO_BYPASS" >> $GITHUB_OUTPUT

          if [ "$AUTO_BYPASS" = "true" ]; then
            echo "is_protected_path_pr=false" >> $GITHUB_OUTPUT
            echo "requires_iaa=false"         >> $GITHUB_OUTPUT
            exit 0
          fi

          # ------------------------------------------------------------------
          # Detect changed files
          # ------------------------------------------------------------------
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          CHANGED=$(git diff --name-only "origin/${BASE_REF}"...HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED" | head -30

          # ------------------------------------------------------------------
          # Protected-path classification (PPEIA-001 §1)
          # ------------------------------------------------------------------
          IS_PROTECTED=false

          PROTECTED_PATTERNS=(
            "^governance/"
            "^\.agent-admin/"
            "^\.github/agents/"
            "^\.governance-pack/"
            "^\.agent-workspace/.*/knowledge/"
            "supabase/migrations/"
            "schema/"
            "migrations/"
            "BUILD_PROGRESS_TRACKER"
          )

          # PP-01 / PP-02: workflow/script only if governance-affecting name
          GOVERNANCE_KEYWORDS="governance|iaa|handover|injector|ecap|merge.gate|protected.path|ceremony|assurance|prehandover|preflight|boundary|polc|session.memory|wave.record"

          while IFS= read -r fpath; do
            [ -z "$fpath" ] && continue

            for pattern in "${PROTECTED_PATTERNS[@]}"; do
              if echo "$fpath" | grep -qP "$pattern"; then
                IS_PROTECTED=true
                break 2
              fi
            done

            # PP-01 / PP-02 governance-affecting check
            if echo "$fpath" | grep -qE "^\.github/workflows/|^\.github/scripts/"; then
              if echo "$fpath" | grep -qiE "$GOVERNANCE_KEYWORDS"; then
                IS_PROTECTED=true
                break
              fi
            fi
          done <<< "$CHANGED"

          echo "is_protected_path_pr=$IS_PROTECTED" >> $GITHUB_OUTPUT

          # ------------------------------------------------------------------
          # IAA requirement: all foreman/agent PRs require IAA unless bypassed
          # ------------------------------------------------------------------
          REQUIRES_IAA=false
          if [[ "$PR_LABELS" == *"agent:"* ]] || [[ "$PR_LABELS" == *"foreman"* ]] || \
             [[ "$PR_LABELS" == *"governance"* ]] || [[ "$IS_PROTECTED" == "true" ]]; then
            REQUIRES_IAA=true
          fi

          echo "requires_iaa=$REQUIRES_IAA" >> $GITHUB_OUTPUT

          echo ""
          echo "Classification summary:"
          echo "  is_protected_path_pr: $IS_PROTECTED"
          echo "  requires_iaa:         $REQUIRES_IAA"
          echo "  is_auto_bypass:       $AUTO_BYPASS"

  # ============================================================================
  # JOB 2: IAA Final Assurance Hard Gate
  # ============================================================================
  iaa-final-assurance-gate:
    name: "iaa-ecap/iaa-final-assurance"
    runs-on: ubuntu-latest
    needs: classify-protected-paths
    if: |
      needs.classify-protected-paths.outputs.is_auto_bypass != 'true' &&
      needs.classify-protected-paths.outputs.requires_iaa == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run IAA final assurance gate
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA:  ${{ github.event.pull_request.head.sha }}
          PR_BODY:   ${{ github.event.pull_request.body }}
        run: |
          echo "=== IAA Final Assurance Hard Gate ==="
          echo "Authority: PPEIA-001, EFIA-001, AAEV-001 | AC1, AC2, AC6, AC7, AC8"
          echo ""

          # Extract governing issue from PR body (look for "governing_delivery_issue: #NNN")
          GOVERNING_ISSUE=""
          ISSUE_MATCH=$(echo "$PR_BODY" | grep -oP '(?:governing_delivery_issue|governing_issue)\s*:\s*#(\d+)' | grep -oP '\d+' | head -1 || true)
          if [ -n "$ISSUE_MATCH" ]; then
            GOVERNING_ISSUE="--governing-issue $ISSUE_MATCH"
            echo "Extracted governing issue: #$ISSUE_MATCH"
          fi

          python3 .github/scripts/validate-iaa-final-assurance.py \
            --pr-number "$PR_NUMBER" \
            --head-sha  "$HEAD_SHA" \
            $GOVERNING_ISSUE \
            --repo-root .

  # ============================================================================
  # JOB 3: ECAP Ceremony Hard Gate
  # ============================================================================
  ecap-ceremony-gate:
    name: "iaa-ecap/ecap-ceremony"
    runs-on: ubuntu-latest
    needs: classify-protected-paths
    if: |
      needs.classify-protected-paths.outputs.is_auto_bypass != 'true' &&
      needs.classify-protected-paths.outputs.is_protected_path_pr == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run ECAP ceremony gate
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "=== ECAP Ceremony Hard Gate ==="
          echo "Authority: PPEIA-001, ECAP-001 v1.3.0 | AC3, AC4, AC5, AC8"
          echo ""

          BASE_REF="${{ github.event.pull_request.base.ref }}"
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}"...HEAD 2>/dev/null || echo "")

          echo "$CHANGED_FILES" | python3 .github/scripts/validate-ecap-ceremony.py \
            --pr-number "$PR_NUMBER" \
            --files-from-stdin \
            --repo-root .

  # ============================================================================
  # JOB 4: Combined gate summary (always runs to provide unified status)
  # ============================================================================
  iaa-ecap-gate-summary:
    name: "iaa-ecap/gate-summary"
    runs-on: ubuntu-latest
    needs:
      - classify-protected-paths
      - iaa-final-assurance-gate
      - ecap-ceremony-gate
    if: always()
    steps:
      - name: Gate summary
        env:
          CLASSIFY_RESULT:  ${{ needs.classify-protected-paths.result }}
          IAA_RESULT:       ${{ needs.iaa-final-assurance-gate.result }}
          ECAP_RESULT:      ${{ needs.ecap-ceremony-gate.result }}
          IS_AUTO_BYPASS:   ${{ needs.classify-protected-paths.outputs.is_auto_bypass }}
          IS_PROTECTED:     ${{ needs.classify-protected-paths.outputs.is_protected_path_pr }}
          REQUIRES_IAA:     ${{ needs.classify-protected-paths.outputs.requires_iaa }}
        run: |
          echo "=== IAA / ECAP Hard Gate Summary ==="
          echo "Authority: PPEIA-001, EFIA-001, ECAP-001 v1.3.0 | Issue: #1154"
          echo ""
          echo "Classification:   $CLASSIFY_RESULT"
          echo "Auto-bypass:      $IS_AUTO_BYPASS"
          echo "Protected-path:   $IS_PROTECTED"
          echo "Requires IAA:     $REQUIRES_IAA"
          echo "IAA gate result:  $IAA_RESULT"
          echo "ECAP gate result: $ECAP_RESULT"
          echo ""

          GATE_FAILED=false

          if [ "$IS_AUTO_BYPASS" = "true" ]; then
            echo "✅ GATE PASS (auto-bypass — governance/layer-down PR)"
            exit 0
          fi

          if [ "$REQUIRES_IAA" = "true" ] && [ "$IAA_RESULT" = "failure" ]; then
            echo "❌ IAA FINAL ASSURANCE GATE: FAILED"
            GATE_FAILED=true
          elif [ "$REQUIRES_IAA" = "true" ] && [ "$IAA_RESULT" = "success" ]; then
            echo "✅ IAA FINAL ASSURANCE GATE: PASSED"
          elif [ "$REQUIRES_IAA" != "true" ]; then
            echo "ℹ️  IAA GATE: NOT REQUIRED for this PR"
          fi

          if [ "$IS_PROTECTED" = "true" ] && [ "$ECAP_RESULT" = "failure" ]; then
            echo "❌ ECAP CEREMONY GATE: FAILED"
            GATE_FAILED=true
          elif [ "$IS_PROTECTED" = "true" ] && [ "$ECAP_RESULT" = "success" ]; then
            echo "✅ ECAP CEREMONY GATE: PASSED"
          elif [ "$IS_PROTECTED" != "true" ]; then
            echo "ℹ️  ECAP GATE: NOT REQUIRED (no protected paths)"
          fi

          echo ""
          if [ "$GATE_FAILED" = "true" ]; then
            echo "❌ COMBINED GATE: FAIL — merge is BLOCKED"
            echo ""
            echo "Remediation:"
            echo "  IAA failure: Obtain IAA PASS token bound to current PR/issue/SHA."
            echo "  ECAP failure: Complete ECAP ceremony and commit reconciliation bundle."
            echo ""
            echo "Authority: PPEIA-001 §2, EFIA-001 §1, ECAP-001 §3"
            exit 1
          else
            echo "✅ COMBINED GATE: PASS"
          fi
