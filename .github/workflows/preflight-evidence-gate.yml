name: Preflight Evidence Gate

# Authority: LIVING_AGENT_SYSTEM.md v6.2.0, AGENT_PREFLIGHT_PATTERN.md v1.0.0
# Purpose: Block PRs from agent-driven work unless the active agent's session memory
#          contains a non-empty phase_1_preflight evidence block.
#          Also enforces IAA Pre-Brief gate per IAA_PRE_BRIEF_PROTOCOL.md v1.2.0:
#          wave-current-tasks.md must exist AND an iaa-prebrief-*.md must exist in
#          .agent-admin/assurance/ before any foreman PR may be merged.
# Violation class: GOV-BREACH-AIMC-W5-002 (preflight skip)
#                  HALT-008 (pre-brief or wave tasks absent before file-write/PR open)
# Assignee: Copilot (automation script / CI infra update)

on:
  # FIX: Changed from pull_request to pull_request_target to bypass Copilot agent approval gate
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  preflight-evidence-check:
    name: "preflight/phase-1-evidence"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check for Phase 1 Preflight Evidence
        id: preflight_check
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "=== Phase 1 Preflight Evidence Gate ==="
          echo "Authority: LIVING_AGENT_SYSTEM.md v6.2.0"
          echo "Violation class: GOV-BREACH-AIMC-W5-002 (preflight skip)"
          echo ""

          # ----------------------------------------------------------------
          # Automated governance alignment PRs are pre-validated — bypass
          # ----------------------------------------------------------------

          if [[ ( "$PR_LABELS" == *"governance"* && "$PR_LABELS" == *"automated"* && "$PR_LABELS" == *"agent:liaison"* ) || \
               "$PR_BRANCH" == "governance-alignment-auto" || \
               "$PR_LABELS" == *"layer-down"* || \
               "$PR_BRANCH" == *"layer-down"* ]]; then
            echo "✅ Automated governance alignment / layer-down PR detected — bypassing preflight gate."
            exit 0
          fi

          # ----------------------------------------------------------------
          # Detect which agent submitted this PR (from labels or PR body)
          # ----------------------------------------------------------------
          AGENT_ID="unknown"
          KNOWN_AGENTS=(
            "foreman-v2-agent"
            "CodexAdvisor-agent"
            "api-builder"
            "qa-builder"
            "schema-builder"
            "ui-builder"
            "integration-builder"
            "maturion-agent"
            "mat-specialist"
            "pit-specialist"
            "governance-liaison-amc-agent"
            "independent-assurance-agent"
            "report-writer-agent"
            "risk-platform-agent"
            "maturity-scoring-agent"
            "criteria-generator-agent"
            "document-parser-agent"
          )

          # Check labels first
          for agent in "${KNOWN_AGENTS[@]}"; do
            if [[ "$PR_LABELS" == *"agent:${agent}"* ]] || [[ "$PR_LABELS" == *"${agent}"* ]]; then
              AGENT_ID="$agent"
              break
            fi
          done

          # If not found via labels, check PR body for agent signature
          if [[ "$AGENT_ID" == "unknown" ]]; then
            for agent in "${KNOWN_AGENTS[@]}"; do
              if echo "$PR_BODY" | grep -qi "$agent"; then
                AGENT_ID="$agent"
                break
              fi
            done
          fi

          echo "Detected agent: $AGENT_ID"
          echo ""

          # ----------------------------------------------------------------
          # If no agent detected, check whether ANY session memory file
          # exists with phase_1_preflight evidence (covers unlabelled PRs)
          # ----------------------------------------------------------------
          EVIDENCE_FOUND=false

          if [[ "$AGENT_ID" == "unknown" ]]; then
            echo "ℹ️  Agent identity not detected from PR labels or body."
            echo "    Searching all session memory files for phase_1_preflight evidence..."
            echo ""

            # NOTE (GOV-BREACH-AIMC-W5-002): Canonical evidence field is `phase_1_preflight: PREFLIGHT COMPLETE`.
            # Agent contracts must include this as a mandatory Step 4.3 session memory field.
            if find .agent-workspace -name "session-*.md" 2>/dev/null | xargs grep -qliE "phase_1_preflight|Phase 1.*[Cc]omplete|PREFLIGHT COMPLETE|PREFLIGHT.*PASS|preflight.*evidence|Phase 1 output" 2>/dev/null; then
              EVIDENCE_FOUND=true
              echo "✅ Phase 1 preflight evidence found in at least one session memory file."
            else
              echo "ℹ️  No session memory files found with phase_1_preflight evidence."
              echo "    This PR does not appear to be an agent-driven work PR."
              echo "    Skipping preflight gate (non-agent PR)."
              exit 0
            fi
          else
            # ----------------------------------------------------------------
            # Agent identified — look in its session memory directory
            # ----------------------------------------------------------------
            MEMORY_DIR=".agent-workspace/${AGENT_ID}/memory"
            echo "Session memory directory: $MEMORY_DIR"
            echo ""

            if [ ! -d "$MEMORY_DIR" ]; then
              echo "⚠️  Session memory directory not found: $MEMORY_DIR"
              echo "    This may be a new agent or the session memory was not committed."
              echo "ℹ️  Falling back to broad search across all session memory files..."
              echo ""
            fi

            # Search in agent-specific directory first, then fall back to broader search
            SEARCH_PATHS="$MEMORY_DIR"
            if [ ! -d "$MEMORY_DIR" ]; then
              SEARCH_PATHS=".agent-workspace"
            fi

            if find "$SEARCH_PATHS" -name "session-*.md" 2>/dev/null | \
               xargs grep -qliE "phase_1_preflight|Phase 1.*[Cc]omplete|PREFLIGHT COMPLETE|PREFLIGHT.*PASS|preflight.*evidence|Phase 1 output" 2>/dev/null; then
              # Oversight-agent contracts require this in Step 4.3 session memory generation instructions.
              # Builder-agent contracts include the equivalent requirement in their Handover Declaration /
              # PREHANDOVER_PROOF-style checklist rather than as a Step 4.3 session-memory instruction.
              EVIDENCE_FOUND=true
            fi
          fi

          # ----------------------------------------------------------------
          # Evaluate result
          # ----------------------------------------------------------------
          echo "=== Phase 1 Preflight Evidence Check Result ==="
          echo ""

          if [ "$EVIDENCE_FOUND" = true ]; then
            echo "✅ PASS — Phase 1 preflight evidence found in session memory."
            echo ""
            echo "Per AGENT_PREFLIGHT_PATTERN.md v1.0.0:"
            echo "  - Agent completed Phase 1 before submitting this PR."
            echo "  - Preflight compliance confirmed."
          else
            echo "❌ FAIL — No Phase 1 preflight evidence found in session memory."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 GOV-BREACH-AIMC-W5-002 — PREFLIGHT SKIP DETECTED"
            echo ""
            echo "Every agent-driven PR must include a session memory file at:"
            echo "  .agent-workspace/<agent-id>/memory/session-NNN-YYYYMMDD.md"
            echo ""
            echo "The session memory must contain a non-empty phase_1_preflight"
            echo "evidence block proving Phase 1 was executed before any work began."
            echo ""
            echo "Required evidence in session memory (any of):"
            echo "  - 'phase_1_preflight: ...' field with non-empty value"
            echo "  - 'PREFLIGHT COMPLETE' declaration"
            echo "  - 'Phase 1 output:' section with declared evidence"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "Action Required:"
            echo "  1. Complete Phase 1 of your agent contract IN FULL."
            echo "  2. Record Phase 1 evidence output in your session memory file."
            echo "  3. Commit the updated session memory file to this PR."
            echo "  4. Push to re-trigger CI validation."
            echo ""
            echo "Reference:"
            echo "  - LIVING_AGENT_SYSTEM.md v6.2.0"
            echo "  - AGENT_PREFLIGHT_PATTERN.md v1.0.0"
            echo "  - copilot-instructions.md (repo-root enforcement)"
            echo ""
            exit 1
          fi


  iaa-prebrief-check:
    name: "preflight/iaa-prebrief-existence"
    runs-on: ubuntu-latest

    # Only enforce for Copilot/foreman PRs: branches starting with 'copilot/'
    # or PRs authored by the Copilot bot
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Bypass for layer-down and governance alignment PRs
        id: bypass_check
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "=== Layer-Down / Governance Bypass Check ==="
          if [[ ( "$PR_LABELS" == *"governance"* && "$PR_LABELS" == *"automated"* && "$PR_LABELS" == *"agent:liaison"* ) || \
               "$PR_BRANCH" == "governance-alignment-auto" || \
               "$PR_LABELS" == *"layer-down"* || \
               "$PR_BRANCH" == *"layer-down"* || \
               "$PR_TITLE" == *"Layer-Down"* || \
               "$PR_TITLE" == *"layer-down"* ]]; then
            echo "✅ Layer-down / governance alignment PR detected — bypassing IAA pre-brief gate."
            echo "bypass=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  Regular Copilot PR — proceeding with IAA pre-brief enforcement."
            echo "bypass=false" >> $GITHUB_OUTPUT
          fi

      - name: Check IAA Pre-Brief and Wave Tasks existence (HALT-008)
        id: prebrief_check
        if: steps.bypass_check.outputs.bypass != 'true'
        run: |
          echo "=== IAA Pre-Brief Existence Gate (HALT-008) ==="
          echo "Authority: IAA_PRE_BRIEF_PROTOCOL.md v1.2.0"
          echo "Violation class: HALT-008 (prebrief_or_wavetasks_absent)"
          echo ""

          FAIL=false

          # ----------------------------------------------------------------
          # Check 1: wave checklist must exist on this branch
          # Authoritative path: .agent-admin/waves/wave-*-current-tasks.md
          # Legacy path (backward compat): .agent-workspace/foreman-v2/personal/wave-current-tasks.md
          # ----------------------------------------------------------------
          LEGACY_WAVE_TASKS_PATH=".agent-workspace/foreman-v2/personal/wave-current-tasks.md"
          WAVE_TASKS_FOUND=false
          WAVE_TASKS_PATH=""

          # Check authoritative path first
          WAVES_DIR=".agent-admin/waves"
          if [ -d "$WAVES_DIR" ]; then
            while IFS= read -r -d '' f; do
              WAVE_TASKS_FOUND=true
              WAVE_TASKS_PATH="$f"
              break
            done < <(find "$WAVES_DIR" -name "wave-*-current-tasks.md" -print0 2>/dev/null)
          fi

          # Fall back to legacy path if not found in authoritative location
          if ! $WAVE_TASKS_FOUND && [ -f "$LEGACY_WAVE_TASKS_PATH" ]; then
            WAVE_TASKS_FOUND=true
            WAVE_TASKS_PATH="$LEGACY_WAVE_TASKS_PATH"
          fi

          if $WAVE_TASKS_FOUND; then
            echo "✅ wave checklist found at: $WAVE_TASKS_PATH"
          else
            echo "❌ MISSING: No wave checklist found in $WAVES_DIR (wave-*-current-tasks.md) or legacy path $LEGACY_WAVE_TASKS_PATH"
            FAIL=true
          fi

          # ----------------------------------------------------------------
          # Check 2: Governance evidence must exist — either:
          #   (a) iaa-prebrief-*.md in .agent-admin/assurance/ (legacy), OR
          #   (b) amc-wave-record-*.md in .agent-admin/wave-records/ (90/10 model)
          # Per AMC 90/10 Admin Protocol v1.0.0 (Issue #1063)
          # ----------------------------------------------------------------
          ASSURANCE_DIR=".agent-admin/assurance"
          WAVE_RECORDS_DIR=".agent-admin/wave-records"
          PREBRIEF_FOUND=false
          PREBRIEF_PATH=""

          # Check legacy path first
          if [ -d "$ASSURANCE_DIR" ]; then
            while IFS= read -r -d '' f; do
              if ! grep -qi "SUPERSEDED" "$f" 2>/dev/null; then
                PREBRIEF_FOUND=true
                PREBRIEF_PATH="$f"
                break
              fi
            done < <(find "$ASSURANCE_DIR" -name "iaa-prebrief-*.md" -print0 2>/dev/null)
          fi

          # Check consolidated wave-record path (90/10 model)
          if [ "$PREBRIEF_FOUND" = false ] && [ -d "$WAVE_RECORDS_DIR" ]; then
            while IFS= read -r -d '' f; do
              PREBRIEF_FOUND=true
              PREBRIEF_PATH="$f"
              break
            done < <(find "$WAVE_RECORDS_DIR" -name "amc-wave-record-*.md" -print0 2>/dev/null)
          fi

          if $PREBRIEF_FOUND; then
            echo "✅ Governance evidence artifact found at: $PREBRIEF_PATH"
          else
            echo "❌ MISSING: No governance evidence found"
            echo "   Expected: iaa-prebrief-*.md in $ASSURANCE_DIR (legacy)"
            echo "         OR: amc-wave-record-*.md in $WAVE_RECORDS_DIR (90/10 model)"
            FAIL=true
          fi

          # ----------------------------------------------------------------
          # Check 3: governance_evidence_path (or legacy iaa_prebrief_path)
          #          in wave-current-tasks.md must not be PENDING
          # Per AMC 90/10 Admin Protocol v1.0.0 (Issue #1063):
          #   governance_evidence_path is the preferred field name.
          #   iaa_prebrief_path is accepted for backward compatibility.
          # ----------------------------------------------------------------
          if [ -f "$WAVE_TASKS_PATH" ]; then
            if grep -q "governance_evidence_path:.*PENDING\|iaa_prebrief_path:.*PENDING" "$WAVE_TASKS_PATH" 2>/dev/null; then
              echo "❌ governance_evidence_path / iaa_prebrief_path is still PENDING in $WAVE_TASKS_PATH"
              echo "   Update to the evidence artifact path before opening a PR."
              FAIL=true
            elif grep -q "governance_evidence_path:\|iaa_prebrief_path:" "$WAVE_TASKS_PATH" 2>/dev/null; then
              EVIDENCE_FIELD=$(grep "governance_evidence_path:\|iaa_prebrief_path:" "$WAVE_TASKS_PATH" | head -1)
              echo "✅ Evidence path field resolved: $EVIDENCE_FIELD"
            else
              echo "⚠️  governance_evidence_path / iaa_prebrief_path field absent from $WAVE_TASKS_PATH"
              echo "   Add governance_evidence_path per AMC 90/10 Admin Protocol v1.0.0"
              FAIL=true
            fi
          fi

          echo ""
          echo "=== IAA Pre-Brief Gate Result ==="
          echo ""

          if [ "$FAIL" = true ]; then
            echo "❌ FAIL — IAA Pre-Brief gate: HALT-008"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🚨 HALT-008 — PRE-BRIEF GATE FAILED"
            echo ""
            echo "Before any file-write, report_progress, or PR open, Foreman MUST verify:"
            echo "  (a) wave-current-tasks.md exists at: .agent-workspace/foreman-v2/personal/wave-current-tasks.md"
            echo "  (b) Governance evidence: iaa-prebrief-*.md in .agent-admin/assurance/ OR amc-wave-record-*.md in .agent-admin/wave-records/"
            echo "  (c) governance_evidence_path (or iaa_prebrief_path) in wave-current-tasks.md is NOT PENDING"
            echo ""
            echo "Per IAA_PRE_BRIEF_PROTOCOL.md v1.2.0:"
            echo "  - PHASE_A_ADVISORY is abolished. There is no IAA-unavailable bypass."
            echo "  - If IAA is unavailable, HALT and notify CS2 (@APGI-cmy) via issue comment."
            echo "  - No Pre-Brief = no build actions."
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            exit 1
          else
            echo "✅ PASS — IAA Pre-Brief gate passed. All pre-brief artifacts present."
            echo ""
            echo "Per IAA_PRE_BRIEF_PROTOCOL.md v1.2.0 and foreman-v2-agent.md HALT-008."
          fi

  iaa-token-self-cert-check:
    name: "preflight/iaa-token-self-certification"
    runs-on: ubuntu-latest

    # Only enforce for Copilot/foreman PRs
    if: >-
      startsWith(github.head_ref, 'copilot/') ||
      github.event.pull_request.user.login == 'Copilot'

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Bypass for layer-down and governance alignment PRs
        id: bypass_check
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "=== Layer-Down / Governance Bypass Check ==="
          if [[ ( "$PR_LABELS" == *"governance"* && "$PR_LABELS" == *"automated"* && "$PR_LABELS" == *"agent:liaison"* ) || \
               "$PR_BRANCH" == "governance-alignment-auto" || \
               "$PR_LABELS" == *"layer-down"* || \
               "$PR_BRANCH" == *"layer-down"* || \
               "$PR_TITLE" == *"Layer-Down"* || \
               "$PR_TITLE" == *"layer-down"* ]]; then
            echo "✅ Layer-down / governance alignment PR detected — bypassing IAA token self-cert gate."
            echo "bypass=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  Regular Copilot PR — proceeding with IAA token self-cert enforcement."
            echo "bypass=false" >> $GITHUB_OUTPUT
          fi

      - name: Check IAA token self-certification guard
        id: token_self_cert_check
        if: steps.bypass_check.outputs.bypass != 'true'
        run: |
          echo "=== IAA Token Self-Certification Guard ==="
          echo "Authority: IAA_PRE_BRIEF_PROTOCOL.md v1.2.0 §IAA Token Self-Certification Guard"
          echo ""

          ASSURANCE_DIR=".agent-admin/assurance"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          # Scope check to token files that are NEW in this PR (not pre-existing in base)
          TOKEN_FILES=$(git diff "$BASE_SHA" HEAD --name-only --diff-filter=A 2>/dev/null \
            | grep "^${ASSURANCE_DIR}/iaa-token-.*\.md$" | head -20)

          if [ -z "$TOKEN_FILES" ]; then
            echo "ℹ️  No new IAA token files added in this PR — skipping self-cert check."
            echo "   (Token check is only enforced for token files introduced by this PR.)"
            exit 0
          fi

          FAIL=false
          while IFS= read -r token_file; do
            echo "Checking token file: $token_file"

            # Skip REJECTION-PACKAGE files
            if head -10 "$token_file" 2>/dev/null | grep -qi "REJECTION.PACKAGE\|REJECTION-PACKAGE"; then
              echo "  ⏭️  REJECTION-PACKAGE file — skipping PHASE_B_BLOCKING_TOKEN check"
              continue
            fi

            # Check 1: PHASE_B_BLOCKING_TOKEN field must be present and non-empty
            if grep -q "PHASE_B_BLOCKING_TOKEN:" "$token_file" 2>/dev/null; then
              TOKEN_VALUE=$(grep "PHASE_B_BLOCKING_TOKEN:" "$token_file" | head -1 | sed 's/.*PHASE_B_BLOCKING_TOKEN://;s/^[[:space:]]*//;s/[[:space:]]*$//')
              if [ -z "$TOKEN_VALUE" ]; then
                echo "  ❌ PHASE_B_BLOCKING_TOKEN field is EMPTY or whitespace-only in $token_file — IAA-SELF-CERT-001"
                FAIL=true
              elif [ "$TOKEN_VALUE" = "PENDING" ]; then
                echo "  ❌ PHASE_B_BLOCKING_TOKEN is PENDING in $token_file — IAA-SELF-CERT-002"
                FAIL=true
              else
                echo "  ✅ PHASE_B_BLOCKING_TOKEN present and non-empty, value: $TOKEN_VALUE"
              fi
            else
              echo "  ❌ PHASE_B_BLOCKING_TOKEN field MISSING from $token_file — IAA-SELF-CERT-001"
              FAIL=true
            fi

            # Check 2: Token must not be PHASE_A_ADVISORY
            if grep -q "PHASE_A_ADVISORY" "$token_file" 2>/dev/null; then
              echo "  ❌ Token contains PHASE_A_ADVISORY — IAA-PHASE-A-BYPASS-001"
              FAIL=true
            else
              echo "  ✅ No PHASE_A_ADVISORY in token file"
            fi

          done <<< "$TOKEN_FILES"

          echo ""
          if [ "$FAIL" = true ]; then
            echo "❌ FAIL — IAA token self-certification guard failed"
            echo ""
            echo "Violation: IAA-SELF-CERT-001, IAA-SELF-CERT-002 or IAA-PHASE-A-BYPASS-001"
            echo "The IAA token file must contain a PHASE_B_BLOCKING_TOKEN field (non-empty, not PENDING)."
            echo "This field is only contractually producible by the IAA."
            echo "Its absence, a PENDING value, or a PHASE_A_ADVISORY value indicates self-authoring."
            echo ""
            exit 1
          else
            echo "✅ PASS — All IAA token files pass self-certification guard."
          fi
  agent-ceremony/artifact-checks:
    name: "agent-ceremony/artifact-checks"
    runs-on: ubuntu-latest

    # Only run when the PR modifies agent contract files
    if: >-
      contains(join(github.event.pull_request.files.*.filename, ','), '.github/agents/')

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Bypass for layer-down and governance-alignment PRs
        id: bypass_check
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ( "$PR_LABELS" == *"governance"* && "$PR_LABELS" == *"automated"* && "$PR_LABELS" == *"agent:liaison"* ) || \
               "$PR_BRANCH" == "governance-alignment-auto" || \
               "$PR_LABELS" == *"layer-down"* || \
               "$PR_BRANCH" == *"layer-down"* || \
               "$PR_TITLE" == *"Layer-Down"* || \
               "$PR_TITLE" == *"layer-down"* ]]; then
            echo "✅ Layer-down / governance alignment PR — bypassing agent ceremony artifact checks."
            echo "bypass=true" >> $GITHUB_OUTPUT
          else
            echo "bypass=false" >> $GITHUB_OUTPUT
          fi

      - name: Agent ceremony artifact checks (HFMC-01–06, CORE-013/015/016/018/019, CERT-001–004)
        if: steps.bypass_check.outputs.bypass != 'true'
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "=== Agent Ceremony Artifact Checks ==="
          echo "Authority: LIVING_AGENT_SYSTEM.md v6.2.0, IAA contract v2.5.0"
          echo "Checks: HFMC-01–06, CORE-013/015/016/018/019, CERT-001–004"
          echo ""

          FAIL=false

          # ----------------------------------------------------------------
          # Detect agent ID from labels or PR body
          # ----------------------------------------------------------------
          AGENT_ID="unknown"
          KNOWN_AGENTS=(
            "foreman-v2-agent" "CodexAdvisor-agent" "api-builder" "qa-builder"
            "schema-builder" "ui-builder" "integration-builder"
            "governance-liaison-amc-agent" "independent-assurance-agent"
          )
          for agent in "${KNOWN_AGENTS[@]}"; do
            if [[ "$PR_LABELS" == *"agent:${agent}"* ]] || [[ "$PR_LABELS" == *",${agent},"* ]] || [[ "$PR_LABELS" == "${agent},"* ]] || [[ "$PR_LABELS" == *",${agent}" ]] || [[ "$PR_LABELS" == "${agent}" ]] || echo "$PR_BODY" | grep -qiE "(^|[^a-z-])${agent}([^a-z-]|$)"; then
              AGENT_ID="$agent"
              break
            fi
          done
          echo "Detected agent: $AGENT_ID"
          echo ""

          # ----------------------------------------------------------------
          # HFMC-01 / CERT-001: PREHANDOVER proof exists
          # ----------------------------------------------------------------
          PREHANDOVER_FOUND=false
          for search_path in ".agent-admin/prehandover" ".agent-workspace"; do
            if [ -d "$search_path" ]; then
              if find "$search_path" -name "PREHANDOVER*" -o -name "prehandover*" 2>/dev/null | grep -q .; then
                PREHANDOVER_FOUND=true
                break
              fi
            fi
          done
          if $PREHANDOVER_FOUND; then
            echo "✅ HFMC-01 / CERT-001: PREHANDOVER proof exists"
          else
            echo "❌ HFMC-01 / CERT-001: PREHANDOVER proof NOT FOUND in .agent-admin/prehandover/ or .agent-workspace/"
            FAIL=true
          fi

          # ----------------------------------------------------------------
          # HFMC-02 / CERT-002: Session memory file exists
          # ----------------------------------------------------------------
          SESSION_MEMORY_PATH=""
          if [ "$AGENT_ID" != "unknown" ]; then
            SESSION_MEMORY_PATH=".agent-workspace/${AGENT_ID}/memory"
          else
            SESSION_MEMORY_PATH=".agent-workspace"
          fi
          if find "$SESSION_MEMORY_PATH" -name "session-*.md" 2>/dev/null | grep -q .; then
            echo "✅ HFMC-02 / CERT-002: Session memory file exists in $SESSION_MEMORY_PATH"
          else
            echo "❌ HFMC-02 / CERT-002: Session memory file NOT FOUND in $SESSION_MEMORY_PATH"
            FAIL=true
          fi

          # ----------------------------------------------------------------
          # HFMC-03 / CERT-003: phase_1_preflight: PREFLIGHT COMPLETE in session memory
          # ----------------------------------------------------------------
          if find "$SESSION_MEMORY_PATH" -name "session-*.md" 2>/dev/null | \
             xargs grep -qlE "phase_1_preflight:[[:space:]]*PREFLIGHT COMPLETE" 2>/dev/null; then
            echo "✅ HFMC-03 / CERT-003: phase_1_preflight: PREFLIGHT COMPLETE present in session memory"
          else
            echo "❌ HFMC-03 / CERT-003: phase_1_preflight: PREFLIGHT COMPLETE NOT FOUND in session memory"
            FAIL=true
          fi

          # ----------------------------------------------------------------
          # HFMC-04 / CERT-004 / CORE-016: IAA token file exists
          # ----------------------------------------------------------------
          ASSURANCE_DIR=".agent-admin/assurance"
          IAA_TOKEN_FOUND=false
          IAA_TOKEN_PATH=""
          if [ -d "$ASSURANCE_DIR" ]; then
            while IFS= read -r -d '' f; do
              IAA_TOKEN_FOUND=true
              IAA_TOKEN_PATH="$f"
              break
            done < <(find "$ASSURANCE_DIR" -name "iaa-token-*.md" -print0 2>/dev/null)
          fi
          if $IAA_TOKEN_FOUND; then
            echo "✅ HFMC-04 / CERT-004 / CORE-016: IAA token file exists at: $IAA_TOKEN_PATH"
          else
            echo "❌ HFMC-04 / CERT-004 / CORE-016: IAA token file NOT FOUND in $ASSURANCE_DIR"
            FAIL=true
          fi

          # ----------------------------------------------------------------
          # HFMC-05: PHASE_B_BLOCKING_TOKEN present and non-PENDING in token file
          # (Only check token files NEW to this PR to avoid double-checking with iaa-token-self-cert-check job)
          # ----------------------------------------------------------------
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          NEW_TOKEN_FILES=$(git diff "$BASE_SHA" HEAD --name-only --diff-filter=A 2>/dev/null \
            | grep "^${ASSURANCE_DIR}/iaa-token-.*\.md$" | head -5 || true)
          if [ -n "$NEW_TOKEN_FILES" ]; then
            while IFS= read -r token_file; do
              [ -z "$token_file" ] && continue
              if head -10 "$token_file" 2>/dev/null | grep -qi "REJECTION.PACKAGE"; then
                echo "  ⏭️  HFMC-05: REJECTION-PACKAGE token file — skipping PHASE_B_BLOCKING_TOKEN check"
                continue
              fi
              if grep -q "PHASE_B_BLOCKING_TOKEN:" "$token_file" 2>/dev/null; then
                TOKEN_VALUE=$(grep "PHASE_B_BLOCKING_TOKEN:" "$token_file" | head -1 | sed 's/.*PHASE_B_BLOCKING_TOKEN://;s/^[[:space:]]*//;s/[[:space:]]*$//')
                if [ "$TOKEN_VALUE" = "PENDING" ] || [ -z "$TOKEN_VALUE" ]; then
                  echo "❌ HFMC-05: PHASE_B_BLOCKING_TOKEN is PENDING or empty in $token_file"
                  FAIL=true
                else
                  echo "✅ HFMC-05: PHASE_B_BLOCKING_TOKEN non-PENDING in $token_file"
                fi
              else
                echo "❌ HFMC-05: PHASE_B_BLOCKING_TOKEN MISSING from $token_file"
                FAIL=true
              fi
            done <<< "$NEW_TOKEN_FILES"
          else
            echo "ℹ️  HFMC-05: No new IAA token files in this PR — check skipped"
          fi

          # ----------------------------------------------------------------
          # HFMC-06: IAA pre-brief exists for foreman PRs
          # ----------------------------------------------------------------
          IS_FOREMAN_PR=false
          if [[ "$PR_LABELS" == *"foreman-v2-agent"* ]] || echo "$PR_BODY" | grep -qi "foreman"; then
            IS_FOREMAN_PR=true
          fi
          if $IS_FOREMAN_PR; then
            if find "$ASSURANCE_DIR" -name "iaa-prebrief-wave*.md" 2>/dev/null | grep -q .; then
              echo "✅ HFMC-06: iaa-prebrief-wave*.md exists for foreman PR"
            else
              echo "❌ HFMC-06: iaa-prebrief-wave*.md NOT FOUND in $ASSURANCE_DIR (required for foreman PRs)"
              FAIL=true
            fi
          else
            echo "ℹ️  HFMC-06: Not a foreman PR — pre-brief check skipped"
          fi

          # ----------------------------------------------------------------
          # CORE-013 / CORE-018: Complete evidence artifact sweep
          # ----------------------------------------------------------------
          echo ""
          echo "--- Evidence artifact sweep (CORE-013, CORE-018) ---"
          if $PREHANDOVER_FOUND; then
            echo "✅ CORE-013 / CORE-018: PREHANDOVER proof present"
          else
            echo "❌ CORE-013 / CORE-018: PREHANDOVER proof absent — sweep FAIL"
            FAIL=true
          fi
          if find "$SESSION_MEMORY_PATH" -name "session-*.md" 2>/dev/null | grep -q .; then
            echo "✅ CORE-015 / CORE-018: Session memory present"
          else
            echo "❌ CORE-015 / CORE-018: Session memory absent — sweep FAIL"
            FAIL=true
          fi
          if $IAA_TOKEN_FOUND; then
            echo "✅ CORE-016 / CORE-018: IAA token file present"
          else
            echo "❌ CORE-016 / CORE-018: IAA token file absent — sweep FAIL"
            FAIL=true
          fi

          # ----------------------------------------------------------------
          # CORE-019: IAA token cross-verification
          # ----------------------------------------------------------------
          if $IAA_TOKEN_FOUND; then
            if grep -qi "ASSURANCE-TOKEN\|PHASE_B_BLOCKING_TOKEN" "$IAA_TOKEN_PATH" 2>/dev/null; then
              echo "✅ CORE-019: IAA token file contains ASSURANCE-TOKEN or PHASE_B_BLOCKING_TOKEN"
            else
              echo "⚠️  CORE-019: IAA token file present but ASSURANCE-TOKEN marker not found (may be first invocation)"
            fi
          fi

          # ----------------------------------------------------------------
          # Result
          # ----------------------------------------------------------------
          echo ""
          echo "=== Agent Ceremony Artifact Checks Result ==="
          if [ "$FAIL" = true ]; then
            echo ""
            echo "❌ FAIL — Agent ceremony artifact checks failed."
            echo ""
            echo "All ceremony artifacts must be committed to the PR branch before this check passes."
            echo "Required artifacts: PREHANDOVER proof, session memory (with PREFLIGHT COMPLETE), IAA token file."
            echo ""
            echo "Reference: .agent-workspace/independent-assurance-agent/knowledge/iaa-high-frequency-checks.md"
            exit 1
          else
            echo "✅ PASS — All agent ceremony artifact checks passed."
          fi
