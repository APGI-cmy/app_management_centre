name: Copilot Setup Steps

# Runs during the "Prepare Copilot" phase — BEFORE "Start MCP Servers".
# Adds a preflight self-test for the agent-bootstrap MCP server so that
# missing dist/ files (MODULE_NOT_FOUND) surface as a clear Node stack trace
# rather than the generic "MCP error -32000: Connection closed".
#
# Copilot session mode: COMMENT_ONLY. No write-back. No push.
# Read-only checkout is sufficient. All output delivered as PR comments or artifacts.
# For bot write operations (git push, mutations), use copilot-bot-automation.yml.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      # Read-only checkout — no token override needed. Default GITHUB_TOKEN is sufficient.
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Declare Copilot session mode
        run: |
          echo "COPILOT_SESSION_MODE=COMMENT_ONLY" >> "$GITHUB_ENV"
          echo "PUSH_DISABLED_INTENTIONAL=true" >> "$GITHUB_ENV"
          echo "OUTPUT_MODE=PR_COMMENT_OR_ARTIFACT" >> "$GITHUB_ENV"
          echo "--- Copilot Session Mode ---"
          echo "COPILOT_SESSION_MODE=COMMENT_ONLY"
          echo "PUSH_DISABLED_INTENTIONAL=true"
          echo "OUTPUT_MODE=PR_COMMENT_OR_ARTIFACT"
          echo "Copilot operates as comment-only. No push. No git write-back."
          echo "All output delivered as PR comments or artifacts."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install agent-bootstrap dependencies
        shell: bash
        run: |
          set -euo pipefail
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          cd mcp-servers/agent-bootstrap
          echo "Installing dependencies via npm ci..."
          npm ci

      - name: Agent-bootstrap MCP preflight self-test (Linux)
        shell: bash
        run: |
          set -euo pipefail
          echo "Node: $(node --version)"
          echo "PWD: $(pwd)"
          cd mcp-servers/agent-bootstrap
          echo "Running agent-bootstrap validation suite..."
          npm test
